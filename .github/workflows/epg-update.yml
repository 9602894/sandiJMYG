name: EPG Data Update

on:
  schedule:
    - cron: '0 16,22,4,10 * * *'  # 北京时间 0点,6点,12点,18点
  workflow_dispatch:

jobs:
  update-epg:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # 允许推送代码

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install requests pytz lxml

    - name: Process EPG data
      run: python scripts/process_epg.py

    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add epg_data/
        git diff --cached --quiet || git commit -m "🔄 EPG Update $(date +'%Y-%m-%d %H:%M')"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # 使用内置令牌
